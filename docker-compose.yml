services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${VUECUTTER_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    privileged: true
    depends_on:
      - redis
    environment:
      IN_DOCKER: "true"
      PLEXDATA_CONFIG: /app/config.toml
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VUECUTTER_REDIS_PASSWORD: ${REDIS_PASSWORD}
      VUECUTTER_MEDIA_ROOT: ${VUECUTTER_MEDIA_ROOT:-}
      VUECUTTER_MEDIA_KEEP_SHARE: ${VUECUTTER_MEDIA_KEEP_SHARE:-true}
      VUECUTTER_FILESERVER: ${VUECUTTER_FILESERVER:-}
      VUECUTTER_FILESERVER_MAC: ${VUECUTTER_FILESERVER_MAC:-}
      VUECUTTER_PLEX_NAME: ${VUECUTTER_PLEX_NAME:-}
      VUECUTTER_PLEX_URL: ${VUECUTTER_PLEX_URL:-}
      VUECUTTER_PLEX_TOKEN: ${VUECUTTER_PLEX_TOKEN:-}
      VUECUTTER_WOL_URL: ${VUECUTTER_WOL_URL:-}
      VUECUTTER_FILESERVER_2: ${VUECUTTER_FILESERVER_2:-}
      VUECUTTER_FILESERVER_MAC_2: ${VUECUTTER_FILESERVER_MAC_2:-}
      VUECUTTER_PLEX_NAME_2: ${VUECUTTER_PLEX_NAME_2:-}
      VUECUTTER_PLEX_URL_2: ${VUECUTTER_PLEX_URL_2:-}
      VUECUTTER_PLEX_TOKEN_2: ${VUECUTTER_PLEX_TOKEN_2:-}
      VUECUTTER_WOL_URL_2: ${VUECUTTER_WOL_URL_2:-}
    ports:
      - "${VUECUTTER_BACKEND_PORT:-5200}:5200"
    volumes:
      - ./VueCutter:/app
      - ./docker:/app/docker
      - ${HOST_CONFIG_PATH:-./VueCutter/config.toml}:/app/config.toml:ro
      - type: bind
        source: /etc/smbcredentials
        target: /etc/smbcredentials
        read_only: true
        bind:
          create_host_path: false

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    privileged: true
    depends_on:
      - redis
    command: ["/app/docker/worker-entrypoint.sh"]
    environment:
      IN_DOCKER: "true"
      PLEXDATA_CONFIG: /app/config.toml
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VUECUTTER_REDIS_PASSWORD: ${REDIS_PASSWORD}
      VUECUTTER_MEDIA_ROOT: ${VUECUTTER_MEDIA_ROOT:-}
      VUECUTTER_MEDIA_KEEP_SHARE: ${VUECUTTER_MEDIA_KEEP_SHARE:-true}
      VUECUTTER_FILESERVER: ${VUECUTTER_FILESERVER:-}
      VUECUTTER_FILESERVER_MAC: ${VUECUTTER_FILESERVER_MAC:-}
      VUECUTTER_PLEX_NAME: ${VUECUTTER_PLEX_NAME:-}
      VUECUTTER_PLEX_URL: ${VUECUTTER_PLEX_URL:-}
      VUECUTTER_PLEX_TOKEN: ${VUECUTTER_PLEX_TOKEN:-}
      VUECUTTER_WOL_URL: ${VUECUTTER_WOL_URL:-}
      VUECUTTER_FILESERVER_2: ${VUECUTTER_FILESERVER_2:-}
      VUECUTTER_FILESERVER_MAC_2: ${VUECUTTER_FILESERVER_MAC_2:-}
      VUECUTTER_PLEX_NAME_2: ${VUECUTTER_PLEX_NAME_2:-}
      VUECUTTER_PLEX_URL_2: ${VUECUTTER_PLEX_URL_2:-}
      VUECUTTER_PLEX_TOKEN_2: ${VUECUTTER_PLEX_TOKEN_2:-}
      VUECUTTER_WOL_URL_2: ${VUECUTTER_WOL_URL_2:-}
    volumes:
      - ./VueCutter:/app
      - ./docker:/app/docker
      - ${HOST_CONFIG_PATH:-./VueCutter/config.toml}:/app/config.toml:ro
      - type: bind
        source: /etc/smbcredentials
        target: /etc/smbcredentials
        read_only: true
        bind:
          create_host_path: false

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    environment:
      # API_PROXY_BASE: http://backend:5200
      API_PROXY_BASE: ${API_PROXY_BASE:-http://backend:5200}
      NUXT_PUBLIC_API_BASE: ""
    ports:
      - "${VUECUTTER_FRONTEND_PORT:-8200}:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - frontend-nuxt:/app/.nuxt

volumes:
  redis-data:
  frontend-node-modules:
  frontend-nuxt:
